services:
  postgres:
    image: postgres-17
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - ./data:var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/
    ports:
      - "5432:5432"

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d app" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend-1:
    build: ./backend
    container_name: backend-1
    environment:
      DB_HOST: postgres
      POSTGRES_DB: app
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy

  backend-2:
    build: ./backend
    container_name: backend-2
    environment:
      DB_HOST: postgres
      POSTGRES_DB: app
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "5173:5173"



  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend-1
      - backend-2
      - frontend



